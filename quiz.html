<section class="quiz">


<h1>
🧠 BCA Practice Quiz
</h1>


<p>
Test your programming and computer science knowledge.
</p>




<div class="card">


<h3 id="question">
Question Loading...
</h3>


<div id="options"></div>


<button 
class="btn-primary"
onclick="nextQuestion()">

Next Question

</button>


<h3 id="result"></h3>



</div>



</section>






<footer>

<p>
© 2026 BrainBuddy AI
</p>

</footer>






<script src="js/script.js"></script>



<script>


const quizData = [


{

question:"C language was developed by?",

options:[
"Dennis Ritchie",
"James Gosling",
"Guido van Rossum",
"Bjarne Stroustrup"
],

answer:"Dennis Ritchie"

},

{
    question: "Which component of the computer is often referred to as its 'Brain'?",  
    options: [
      "Hard Disk",
      "Central Processing Unit",
      "Keyboard",
      "Monitor"
    ],
    answer: "Central Processing Unit"
  },

    
{
    question: "Which data type is used to store fractional numbers in C?",  
    options: [
      "int",
      "char",
      "float",
      "void"
    ],
    answer: "float"
  },
  
{
    question: "What is the full form of RAM?",  
    options: [
      "Read Access Memory",
      "Random Access Memory",
      "Run Ample Memory",
      "Read Alternated Memory"
    ],
    answer: "Random Access Memory"
  },
  
{
    question: "Every statement in a C program must end with which character?",  
    options: [
      "Colon (:)",
      "Comma (,)",
      "Period (.)",
      "Semicolon (;)"
    ],
    answer: "Semicolon (;)"
  },
  
{
    question: "Which of the following is an example of an Operating System?",  
    options: [
      "MS Word",
      "Google Chrome",
      "Windows 11",
      "Oracle"
    ],
    answer: "Windows 11"
  },
  
{
    question: "What is the base of the Hexadecimal number system?",  
    options: [
      "2",
      "8",
      "10",
      "16"
    ],
    answer: "16"
  },
  
{
    question: "Which function is used to print output on the screen in C language?",  
    options: [
      "scanf()",
      "printf()",
      "print()",
      "getch()"
    ],
    answer: "printf()"
  },
  
{
    question: "1 Byte is equal to how many bits?",  
    options: [
      "4 bits",
      "8 bits",
      "16 bits",
      "1024 bits"
    ],
    answer: "8 bits"
  },
  
{
    question: "Which of the following is a permanent storage device?",  
    options: [
      "RAM",
      "Cache Memory",
      "Hard Disk",
      "Registers"
    ],
    answer: "Hard Disk"
  },
 
{

question:"HTML stands for?",

options:[
"Hyper Text Markup Language",
"High Text Machine Language",
"Hyper Tool Mark Language",
"None"
],

answer:"Hyper Text Markup Language"

},



{

question:"Which data structure uses FIFO?",

options:[
"Stack",
"Queue",
"Tree",
"Graph"
],

answer:"Queue"

},



{

question:"JavaScript is a?",

options:[
"Programming Language",
"Database",
"Operating System",
"Compiler"
],

answer:"Programming Language"

}



];



let currentQuestion = 0;

let score = 0;

let answered = false;


function loadQuestion(){


let q = quizData[currentQuestion];


document.getElementById("question").innerHTML =
q.question;



let optionBox =
document.getElementById("options");


optionBox.innerHTML="";



q.options.forEach(option=>{


optionBox.innerHTML += `

<button class="btn-secondary"
onclick="checkAnswer('${option}', this)">

${option}

</button>

<br><br>

`;

});


}





function checkAnswer(selected){

    if(answered) return;

    answered = true;

    let correct =
    quizData[currentQuestion].answer;


    if(selected === correct){

        score++;

    }

}

}

else{

    button.style.background = "#ef4444";
    button.style.color = "white";

    document.getElementById("result").innerHTML =
    "❌ Wrong Answer";

}


}




function nextQuestion(){

answered = false;

currentQuestion++;



if(currentQuestion < quizData.length){


loadQuestion();


}

else{


document.getElementById("question").innerHTML =
"Quiz Completed 🎉";


document.getElementById("options").innerHTML="";


document.getElementById("result").innerHTML =
"Your Score: " + score;



saveQuizScore(score);


}



}



loadQuestion();



</script>



</body>
